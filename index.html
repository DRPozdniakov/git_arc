<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Infrastructure Landscape 2026 — Interactive Map of 440+ AI/ML Tools</title>
    <meta name="description" content="Explore the complete AI/ML infrastructure ecosystem. 440+ tools across 28 categories — frameworks, model providers, vector databases, GPU clouds, robotics, and more.">

    <!-- Open Graph / LinkedIn -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="AI Infrastructure Landscape 2026">
    <meta property="og:description" content="Interactive map of 440+ AI/ML tools across 28 categories. Frameworks, model providers, vector DBs, GPU clouds, robotics, and more.">
    <meta property="og:url" content="https://drpozdniakov.github.io/git_arc/">
    <meta property="og:site_name" content="AI Infrastructure Map">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AI Infrastructure Landscape 2026">
    <meta name="twitter:description" content="Interactive map of 440+ AI/ML tools across 28 categories.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📐</text></svg>">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'IBM Plex Mono', 'Courier New', monospace;
            background: #050505;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .switch-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 0;
            background: rgba(5, 5, 5, 0.9);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 6px;
            padding: 3px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.08), 0 4px 16px rgba(0,0,0,0.4);
        }

        .switch-btn {
            padding: 6px 16px;
            font-family: inherit;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: rgba(186, 230, 253, 0.5);
            background: transparent;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .switch-btn:hover {
            color: rgba(186, 230, 253, 0.8);
        }
        .switch-btn.active {
            background: rgba(56, 189, 248, 0.15);
            color: #e0f2fe;
            border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.1);
        }

        .view-frame {
            flex: 1;
            width: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .switch-bar {
                bottom: 10px;
            }
            .switch-btn {
                padding: 8px 14px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="switch-bar">
        <button class="switch-btn active" data-view="blueprint">Blueprint</button>
        <button class="switch-btn" data-view="cards">Cards</button>
    </div>
    <iframe id="viewFrame" class="view-frame" src="blueprint.html"></iframe>

    <script>
        const frame = document.getElementById('viewFrame');
        const views = {
            blueprint: 'blueprint.html',
            cards: 'cards.html'
        };

        // Restore saved preference
        const saved = localStorage.getItem('arc-view');
        if (saved && views[saved]) {
            frame.src = views[saved];
            document.querySelectorAll('.switch-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.view === saved);
            });
        }

        // Switch handler
        document.querySelectorAll('.switch-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const view = btn.dataset.view;
                if (btn.classList.contains('active')) return;
                document.querySelectorAll('.switch-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                frame.src = views[view];
                localStorage.setItem('arc-view', view);
            });
        });
    </script>
    <script data-goatcounter="https://latoff.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
