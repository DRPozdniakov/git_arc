:root{--bg-primary:#0F172A;--bg-secondary:#1E293B;--bg-card:#1E293B;--border-subtle:rgba(148,163,184,0.1);--border-hover:rgba(59,130,246,0.3);--text-primary:#F1F5F9;--text-secondary:#94A3B8;--text-muted:#64748B;--accent-blue:#3B82F6;--accent-teal:#06B6D4;--accent-amber:#F59E0B;--accent-green:#10B981;--radius-sm:6px;--radius-md:10px;--radius-lg:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-y:auto}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,rgba(148,163,184,0.04) 1px,transparent 1px);background-size:32px 32px}
.site-header{position:sticky;top:0;z-index:100;background:rgba(15,23,42,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border-subtle);padding:16px 32px}
.header-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.header-badge{background:linear-gradient(135deg,var(--accent-blue),var(--accent-teal));color:white;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:4px 10px;border-radius:4px}
.header-title{font-size:20px;font-weight:700;letter-spacing:-0.5px;color:var(--text-primary);white-space:nowrap}
.header-stats{display:flex;gap:16px;margin-left:auto;align-items:center}
.stat-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary)}
.stat-value{font-weight:700;font-size:14px;color:var(--text-primary)}
.stat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.controls-bar{max-width:1440px;margin:0 auto;padding:20px 32px 0;display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.search-box{position:relative;flex:1;min-width:260px;max-width:420px}
.search-box input{width:100%;padding:10px 14px 10px 38px;background:var(--bg-secondary);border:1px solid var(--border-subtle);border-radius:var(--radius-md);color:var(--text-primary);font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.search-box input:focus{border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(59,130,246,0.15)}
.search-box input::placeholder{color:var(--text-muted)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;border:1px solid var(--border-subtle);background:transparent;color:var(--text-secondary);text-transform:capitalize;white-space:nowrap}
.pill:hover{border-color:var(--accent-blue);color:var(--text-primary)}
.pill.active{background:var(--accent-blue);border-color:var(--accent-blue);color:white}
.pill-count{display:inline-block;margin-left:4px;font-weight:400;opacity:0.7}
.size-pills{display:flex;gap:6px;flex-wrap:wrap}
.size-pill{padding:7px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;border:1px solid var(--border-subtle);background:transparent;color:var(--text-secondary);white-space:nowrap}
.size-pill:hover{border-color:var(--accent-amber);color:var(--text-primary)}
.size-pill.active{background:var(--accent-amber);border-color:var(--accent-amber);color:#1a1a2e}
.divider-v{width:1px;height:28px;background:var(--border-subtle);flex-shrink:0}
.grid-container{max-width:1600px;margin:0 auto;padding:24px 32px 60px;columns:2;column-gap:20px}
@media(max-width:900px){.grid-container{columns:1}}
.cat-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);overflow:hidden;transition:border-color 0.25s,box-shadow 0.25s;break-inside:avoid;margin-bottom:16px}
.cat-card:hover{border-color:var(--border-hover);box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.cat-card.hidden{display:none}
.cat-header{padding:18px 20px 14px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:12px}
.cat-icon-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-name{font-size:15px;font-weight:700;letter-spacing:-0.3px;color:var(--text-primary)}
.cat-desc{font-size:12px;color:var(--text-muted);margin-left:auto}
.cat-count{font-size:11px;color:var(--text-muted);background:rgba(148,163,184,0.1);padding:2px 8px;border-radius:10px;font-weight:600;flex-shrink:0}
.cat-body{padding:16px 20px 20px}
.subcat-section{margin-bottom:14px}
.subcat-section:last-child{margin-bottom:0}
.subcat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:10px;padding-left:2px}
.tools-grid{display:flex;flex-wrap:wrap;gap:6px}
.tool-item{display:inline-flex;align-items:center;gap:6px;padding:5px 10px 5px 6px;border-radius:20px;background:rgba(148,163,184,0.08);border:1px solid rgba(148,163,184,0.1);cursor:pointer;transition:all 0.2s;position:relative;white-space:nowrap}
.tool-item:hover{border-color:var(--accent-blue);background:rgba(59,130,246,0.12);transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,0.25)}
.tool-item.highlight{background:rgba(59,130,246,0.15);border-color:var(--accent-blue);box-shadow:0 0 8px rgba(59,130,246,0.3)}
.tool-item img{width:18px;height:18px;object-fit:contain;border-radius:3px;flex-shrink:0}
.tool-item .fallback-circle{width:18px;height:18px;border-radius:50%;display:none;font-size:8px;font-weight:700;color:white;align-items:center;justify-content:center;flex-shrink:0}
.tool-name{font-size:11px;font-weight:500;color:var(--text-primary);line-height:1}
.tooltip{position:fixed;z-index:999;pointer-events:none;background:#0F172A;border:1px solid rgba(59,130,246,0.3);border-radius:var(--radius-md);padding:12px 16px;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,0.5);opacity:0;transition:opacity 0.15s;font-size:13px}
.tooltip.visible{opacity:1}
.tooltip-name{font-weight:700;font-size:14px;margin-bottom:4px;color:var(--text-primary)}
.tooltip-desc{color:var(--text-secondary);margin-bottom:6px}
.tooltip-meta{display:flex;gap:8px;flex-wrap:wrap}
.tooltip-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(59,130,246,0.15);color:var(--accent-blue);font-weight:600;text-transform:uppercase}
.tooltip-detection{font-size:11px;color:var(--text-muted);font-family:monospace;margin-top:4px}
.site-footer{max-width:1440px;margin:0 auto;padding:24px 32px 40px;border-top:1px solid var(--border-subtle);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-muted);flex-wrap:wrap;gap:12px}
.footer-link{color:var(--accent-blue);text-decoration:none}
.footer-link:hover{text-decoration:underline}
.results-counter{font-size:13px;color:var(--text-muted);padding:8px 0 0;max-width:1440px;margin:0 auto;padding-left:32px;padding-right:32px}
@media(max-width:860px){.grid-container{padding:16px}.controls-bar{padding:16px}.site-header{padding:12px 16px}.header-stats{margin-left:0;width:100%}.search-box{max-width:100%;min-width:100%}.results-counter{padding-left:16px;padding-right:16px}.site-footer{padding:20px 16px 32px}}

    </style>
</head>

        // ========== FILTERS ==========
        const allTags = ["all"];
        const tagCounts = { all: totalTools };
        tools.forEach(t => {
            (t.tags || []).forEach(tag => {
                if (!tagCounts[tag]) { tagCounts[tag] = 0; allTags.push(tag); }
                tagCounts[tag]++;
            });
        });
        const uniqueTags = [...new Set(allTags)];

        const sizeDefs = [
            { key: "all", label: "All Sizes" },
            { key: "large", label: "Enterprise" },
            { key: "medium", label: "Growth" },
            { key: "small", label: "Emerging" },
            { key: "tiny", label: "Startup/OSS" }
        ];
        const sizeCounts = { all: totalTools };
        tools.forEach(t => {
            if (!sizeCounts[t.size]) sizeCounts[t.size] = 0;
            sizeCounts[t.size]++;
        });

        let activeTag = "all";
        let activeSize = "all";

        function renderTagFilters() {
            document.getElementById("tagFilters").innerHTML = uniqueTags.map(tag =>
                '<button class="pill ' + (activeTag === tag ? 'active' : '') + '" data-tag="' + tag + '">' + tag + '<span class="pill-count">(' + (tagCounts[tag] || 0) + ')</span></button>'
            ).join("");
        }
        function renderSizeFilters() {
            document.getElementById("sizeFilters").innerHTML = sizeDefs.map(s =>
                '<button class="size-pill ' + (activeSize === s.key ? 'active' : '') + '" data-size="' + s.key + '">' + s.label + '<span class="pill-count">(' + (sizeCounts[s.key] || 0) + ')</span></button>'
            ).join("");
        }
        renderTagFilters();
        renderSizeFilters();

        // ========== ICON URL RESOLVER ==========
        // Use iconMap (same as blueprint), colorize LobeHub SVGs that use currentColor
        const colorizedCache = {};
        function colorizeSvg(url, imgEl) {
            if (colorizedCache[url]) { imgEl.src = colorizedCache[url]; return; }
            if (!url.includes('lobehub')) { imgEl.src = url; return; }
            fetch(url).then(r => r.text()).then(text => {
                if (text.includes('currentColor')) {
                    const colored = text.replace(/currentColor/g, '#e0f2fe');
                    const blob = new Blob([colored], {type: 'image/svg+xml'});
                    colorizedCache[url] = URL.createObjectURL(blob);
                } else {
                    colorizedCache[url] = url;
                }
                imgEl.src = colorizedCache[url];
            }).catch(() => { imgEl.src = url; });
        }

        function getIconUrl(tool) {
            const key = tool.icon || tool.id.replace(/^t_/, "");
            if (iconMap[key]) return iconMap[key];
            if (tool.url) {
                try { return "https://www.google.com/s2/favicons?domain=" + new URL(tool.url).hostname + "&sz=64"; }
                catch(e) { return null; }
            }
            return null;
        }

        // ========== RENDER GRID ==========
        function renderGrid() {
            const query = document.getElementById("searchInput").value.toLowerCase().trim();
            const container = document.getElementById("gridContainer");
            container.innerHTML = "";
            let visibleToolCount = 0;

            hierarchy.forEach(cat => {
                const card = document.createElement("div");
                card.className = "cat-card";
                const allCatTools = [...cat.directTools, ...cat.subcategories.flatMap(s => s.tools)];
                const filteredTools = allCatTools.filter(t => {
                    const matchTag = activeTag === "all" || (t.tags || []).includes(activeTag);
                    const matchSize = activeSize === "all" || t.size === activeSize;
                    const matchSearch = !query ||
                        t.name.toLowerCase().includes(query) ||
                        (t.desc || "").toLowerCase().includes(query) ||
                        (t.detection || "").toLowerCase().includes(query) ||
                        (t.tags || []).some(tag => tag.toLowerCase().includes(query));
                    return matchTag && matchSize && matchSearch;
                });

                if (filteredTools.length === 0) {
                    card.classList.add("hidden");
                    container.appendChild(card);
                    return;
                }
                visibleToolCount += filteredTools.length;
                const filteredIds = new Set(filteredTools.map(t => t.id));

                card.innerHTML =
                    '<div class="cat-header">' +
                    '<span class="cat-icon-dot" style="background:' + cat.color + '"></span>' +
                    '<span class="cat-name">' + cat.name + '</span>' +
                    '<span class="cat-desc">' + (cat.desc || '') + '</span>' +
                    '<span class="cat-count">' + filteredTools.length + '</span>' +
                    '</div>';

                const body = document.createElement("div");
                body.className = "cat-body";

                if (cat.directTools.length > 0) {
                    const directFiltered = cat.directTools.filter(t => filteredIds.has(t.id));
                    if (directFiltered.length > 0) {
                        body.appendChild(createToolsGrid(directFiltered, query));
                    }
                }

                cat.subcategories.forEach(sub => {
                    const subFiltered = sub.tools.filter(t => filteredIds.has(t.id));
                    if (subFiltered.length === 0) return;
                    const section = document.createElement("div");
                    section.className = "subcat-section";
                    const label = document.createElement("div");
                    label.className = "subcat-label";
                    label.textContent = sub.name;
                    section.appendChild(label);
                    section.appendChild(createToolsGrid(subFiltered, query));
                    body.appendChild(section);
                });

                card.appendChild(body);
                container.appendChild(card);
            });

            const counter = document.getElementById("resultsCounter");
            if (query || activeTag !== "all" || activeSize !== "all") {
                counter.textContent = "Showing " + visibleToolCount + " of " + totalTools + " tools";
            } else {
                counter.textContent = "";
            }
        }

        function createToolsGrid(toolsList, query) {
            const grid = document.createElement("div");
            grid.className = "tools-grid";
            toolsList.forEach(tool => {
                const item = document.createElement("div");
                item.className = "tool-item";
                if (query && (tool.name.toLowerCase().includes(query) || (tool.detection || "").toLowerCase().includes(query))) {
                    item.classList.add("highlight");
                }
                item.dataset.toolId = tool.id;
                const iconUrl = getIconUrl(tool);
                const initial = tool.name.charAt(0).toUpperCase();
                const parentNode = data.nodes.find(n => n.id === tool.parent);
                const color = catColorMap[tool.parent] || (parentNode ? catColorMap[parentNode.parent] : null) || "#3B82F6";

                if (iconUrl) {
                    const img = document.createElement("img");
                    img.alt = tool.name;
                    img.loading = "lazy";
                    if (iconUrl.includes('lobehub')) {
                        colorizeSvg(iconUrl, img);
                    } else {
                        img.src = iconUrl;
                    }
                    img.onerror = function() {
                        if (this.dataset.tried) {
                            this.style.display = "none";
                            this.nextElementSibling.style.display = "flex";
                        } else {
                            this.dataset.tried = "1";
                            try { this.src = "https://www.google.com/s2/favicons?domain=" + new URL(tool.url || "").hostname + "&sz=64"; }
                            catch(e) { this.style.display = "none"; this.nextElementSibling.style.display = "flex"; }
                        }
                    };
                    item.appendChild(img);
                    const fb = document.createElement("div");
                    fb.className = "fallback-circle";
                    fb.style.background = color;
                    fb.textContent = initial;
                    item.appendChild(fb);
                } else {
                    const fb = document.createElement("div");
                    fb.className = "fallback-circle";
                    fb.style.background = color;
                    fb.style.display = "flex";
                    fb.textContent = initial;
                    item.appendChild(fb);
                }

                const nameSpan = document.createElement("span");
                nameSpan.className = "tool-name";
                nameSpan.textContent = tool.name;
                item.appendChild(nameSpan);

                item.addEventListener("mouseenter", function(e) { showTooltip(e, tool); });
                item.addEventListener("mousemove", function(e) { moveTooltip(e); });
                item.addEventListener("mouseleave", hideTooltip);
                if (tool.url) {
                    item.addEventListener("click", function() { window.open(tool.url, "_blank", "noopener"); });
                }
                grid.appendChild(item);
            });
            return grid;
        }

        // ========== TOOLTIP ==========
        const tooltip = document.getElementById("tooltip");
        function showTooltip(e, tool) {
            document.getElementById("ttName").textContent = tool.name;
            document.getElementById("ttDesc").textContent = tool.desc || "";
            document.getElementById("ttDetection").textContent = tool.detection ? "pip: " + tool.detection : "";
            document.getElementById("ttMeta").innerHTML = (tool.tags || []).map(function(t) {
                return '<span class="tooltip-tag">' + t + '</span>';
            }).join("") + (tool.size ? '<span class="tooltip-tag" style="background:rgba(245,158,11,0.15);color:var(--accent-amber)">' + tool.size + '</span>' : "");
            tooltip.classList.add("visible");
            moveTooltip(e);
        }
        function moveTooltip(e) {
            var pad = 16;
            var x = e.clientX + pad;
            var y = e.clientY + pad;
            var rect = tooltip.getBoundingClientRect();
            if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - pad;
            if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - pad;
            tooltip.style.left = x + "px";
            tooltip.style.top = y + "px";
        }
        function hideTooltip() { tooltip.classList.remove("visible"); }

        // ========== EVENT LISTENERS ==========
        document.getElementById("searchInput").addEventListener("input", renderGrid);
        document.getElementById("tagFilters").addEventListener("click", function(e) {
            var btn = e.target.closest(".pill");
            if (!btn) return;
            activeTag = btn.dataset.tag;
            renderTagFilters();
            renderGrid();
        });
        document.getElementById("sizeFilters").addEventListener("click", function(e) {
            var btn = e.target.closest(".size-pill");
            if (!btn) return;
            activeSize = btn.dataset.size;
            renderSizeFilters();
            renderGrid();
        });

        // ========== INITIAL RENDER ==========
        renderGrid();
    </script>
    <script data-goatcounter="https://gitarc.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
